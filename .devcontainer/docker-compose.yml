services:
  devcontainer:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=hongarije;Username=hongarije;Password=hongarije
    depends_on:
      db:
        condition: service_healthy

  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    volumes:
      - ..:/workspace:cached
      - api-nuget:/root/.nuget/packages
    working_dir: /workspace/backend
    command: dotnet watch run --non-interactive --no-launch-profile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_RUNNING_IN_CONTAINER: "true"
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=hongarije;Username=hongarije;Password=hongarije
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  proxy:
    image: nginx:alpine
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - api

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hongarije
      POSTGRES_USER: hongarije
      POSTGRES_PASSWORD: hongarije
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hongarije"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  api-nuget:
