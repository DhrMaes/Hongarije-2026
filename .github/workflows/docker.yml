name: Build & push Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        id: lowercase
        shell: bash
        run: |
          set -euo pipefail
          owner='${{ github.repository_owner }}'
          owner_lower="$(echo "$owner" | tr '[:upper:]' '[:lower:]')"

          if [ -z "$owner_lower" ]; then
            echo "Failed to derive lowercase repository owner."
            exit 1
          fi

          # Safety check: ensure result is actually lowercase.
          if [ "$owner_lower" != "$(echo "$owner_lower" | tr '[:upper:]' '[:lower:]')" ]; then
            echo "Repository owner lowercase conversion did not produce a lowercase value."
            exit 1
          fi

          echo "owner=$owner_lower" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.owner }}/hongarije-backend:latest
            ghcr.io/${{ steps.lowercase.outputs.owner }}/hongarije-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.owner }}/hongarije-frontend:latest
            ghcr.io/${{ steps.lowercase.outputs.owner }}/hongarije-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Install WireGuard
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard

      - name: Configure WireGuard
        run: |
          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf

      - name: Connect WireGuard VPN
        run: sudo wg-quick up wg0

      - name: Wait for VPN stability
        run: sleep 5

      - name: Verify Portainer reachable
        run: |
          curl --fail --silent --show-error \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            "${{ secrets.PORTAINER_URL }}/api/system/status"

      - name: Update stack image tags
        run: |
          # Fetch current stack env vars so we only update the image tags
          CURRENT_ENV=$(curl --fail --silent \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}" \
            | jq '.Env')

          # Merge: replace BACKEND_TAG and FRONTEND_TAG, keep everything else
          UPDATED_ENV=$(echo "$CURRENT_ENV" | jq --arg sha "${{ github.sha }}" '
            map(if .name == "BACKEND_TAG" then .value = $sha
                elif .name == "FRONTEND_TAG" then .value = $sha
                else . end)
            | if any(.[]; .name == "BACKEND_TAG") | not then . + [{"name":"BACKEND_TAG","value":$sha}] else . end
            | if any(.[]; .name == "FRONTEND_TAG") | not then . + [{"name":"FRONTEND_TAG","value":$sha}] else . end
          ')

          STACK_INFO=$(curl --fail --silent \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}")

          STACK_NAME=$(echo "$STACK_INFO" | jq -r '.Name')

          curl --fail --silent --show-error \
            -X PUT \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$STACK_NAME\",\"env\":$UPDATED_ENV}" \
            "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}"

      - name: Trigger Portainer git redeploy
        run: |
          curl --fail --silent --show-error \
            -X PUT \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"pullImage":true}' \
            "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}/git/redeploy?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}"

      - name: Disconnect WireGuard
        if: always()
        run: sudo wg-quick down wg0
