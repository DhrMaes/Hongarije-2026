name: Build & push Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        id: lowercase
        shell: bash
        run: |
          set -euo pipefail
          owner='${{ github.repository_owner }}'
          owner_lower="$(echo "$owner" | tr '[:upper:]' '[:lower:]')"

          if [ -z "$owner_lower" ]; then
            echo "Failed to derive lowercase repository owner."
            exit 1
          fi

          # Safety check: ensure result is actually lowercase.
          if [ "$owner_lower" != "$(echo "$owner_lower" | tr '[:upper:]' '[:lower:]')" ]; then
            echo "Repository owner lowercase conversion did not produce a lowercase value."
            exit 1
          fi

          echo "owner=$owner_lower" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.owner }}/hongarije-backend:latest
            ghcr.io/${{ steps.lowercase.outputs.owner }}/hongarije-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.owner }}/hongarije-frontend:latest
            ghcr.io/${{ steps.lowercase.outputs.owner }}/hongarije-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.ref_type == 'tag'

    steps:
      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard

      - name: Configure WireGuard
        run: |
          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf

      - name: Connect WireGuard VPN
        run: sudo wg-quick up wg0

      - name: Wait for VPN
        run: sleep 5

      - name: Verify Portainer reachable
        run: |
          curl --fail ${{ secrets.PORTAINER_URL }}/api/system/status

      - name: Redeploy Portainer stack
        run: |
          curl --fail-with-body \
            -X PUT \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}/git/redeploy?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}"

      - name: Disconnect WireGuard
        if: always()
        run: sudo wg-quick down wg0