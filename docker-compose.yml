services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: hongarije
      POSTGRES_USER: hongarije
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hongarije"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${GITHUB_OWNER:-dhrmaes}/hongarije-backend:latest
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DOTNET_RUNNING_IN_CONTAINER: "true"
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=hongarije;Username=hongarije;Password=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/${GITHUB_OWNER:-dhrmaes}/hongarije-frontend:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  postgres-data:
